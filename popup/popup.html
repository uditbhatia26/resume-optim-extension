<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResumeSculpt - AI Resume Optimizer</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="header">
        <div class="logo">
            <div class="logo-icon">
                <img src="./assets/ResumeSculpt-removebg-preview_waifu2x_photo_noise1_scale.svg" height="40"
                    alt="Logo" />
            </div>
            <div class="logo-text">ResumeSculpt</div>
        </div>
        <div class="header-actions">
            <button class="landing-btn" id="landingBtn">Visit Site</button>
            <button class="settings-btn">
                <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 1l3.5 7 7.5 1-5.5 5 1.5 7.5L12 18l-6.5 3.5L7 14l-5.5-5L9 8l3-7z" />
                </svg>
            </button>
        </div>
    </div>

    <div class="main-content">
        <!-- Original Match Score Section -->
        <div class="status-section">
            <div class="status-header">
                <div class="status-title">Original Match Score</div>
            </div>
            <div class="status-value" id="originalScore">--</div>
        </div>

        <div class="action-section">
            <div class="section-title">Job Analysis</div>

            <!-- Job Description Input Area -->
            <div class="input-section">
                <textarea id="jobDescriptionInput" class="job-input-textarea"
                    placeholder="Paste the job description here..." rows="4"></textarea>
                <button class="btn btn-primary" id="addJobBtn">
                    <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
                    </svg>
                    Add Job Description
                </button>
            </div>

            <div class="job-description-container" id="jobContainer" style="display: none;">
                <div class="job-description" id="jobDescription">
                    <!-- Job description will be populated here -->
                </div>
                <div class="job-description-fade" id="fadeOverlay"></div>
                <button class="read-more-btn" id="readMoreBtn">Show Full Description</button>
            </div>

            <button class="btn btn-secondary" id="analyzeBtn" disabled>
                <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
                </svg>
                Analyze Compatibility
            </button>
        </div>

        <div class="action-section">
            <div class="section-title">AI Optimization</div>
            <button class="btn btn-primary" id="generateBtn" disabled>
                <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
                </svg>
                Generate Optimized Resume
            </button>

            <button class="btn btn-secondary" id="previewBtn" disabled>
                <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                    <circle cx="11" cy="11" r="8" />
                    <path d="m21 21-4.35-4.35" />
                </svg>
                Preview Changes
            </button>

            <button class="btn btn-success" id="downloadBtn" disabled>
                <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <polyline points="7 10 12 15 17 10" />
                    <line x1="12" y1="15" x2="12" y2="3" />
                </svg>
                Download Resume
            </button>
        </div>

        <!-- New Optimized Resume Score Section -->
        <div class="optimized-score-section" id="optimizedScoreSection" style="display: none;">
            <div class="section-title">Optimization Results</div>
            <div class="score-comparison">
                <div class="score-card original-score-card">
                    <div class="score-label">Original Score</div>
                    <div class="score-value" id="originalScoreDisplay">--</div>
                </div>
                <div class="score-arrow">
                    <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M5 12h14m-7-7l7 7-7 7" />
                    </svg>
                </div>
                <div class="score-card optimized-score-card">
                    <div class="score-label">Optimized Score</div>
                    <div class="score-value" id="optimizedScore">--</div>
                </div>
            </div>
            <div class="improvement-indicator" id="improvementIndicator">
                <div class="improvement-text" id="improvementText">Calculating improvement...</div>
            </div>
            <button class="btn btn-secondary" id="recalculateBtn">
                <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                    <path d="M3 3v5h5" />
                    <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16" />
                    <path d="M21 21v-5h-5" />
                </svg>
                Recalculate Score
            </button>
        </div>

        <div class="progress-section">
            <div class="section-title">Progress</div>
            <div class="progress-item">
                <div class="progress-icon pending" id="step1">1</div>
                <span>Add job description</span>
            </div>
            <div class="progress-item">
                <div class="progress-icon pending" id="step2">2</div>
                <span>Analyze resume compatibility</span>
            </div>
            <div class="progress-item">
                <div class="progress-icon pending" id="step3">3</div>
                <span>Generate AI-optimized version</span>
            </div>
            <div class="progress-item">
                <div class="progress-icon pending" id="step4">4</div>
                <span>Calculate optimization score</span>
            </div>
            <div class="progress-item">
                <div class="progress-icon pending" id="step5">5</div>
                <span>Download final resume</span>
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
